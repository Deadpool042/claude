# ─── TLS Configuration (mkcert local certificates) ───────────────────
# This file is hand-maintained. Certificates generated with mkcert.

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/local-cert.pem
        keyFile: /etc/traefik/certs/local-key.pem
  certificates:
    - certFile: /etc/traefik/certs/local-cert.pem
      keyFile: /etc/traefik/certs/local-key.pem
