<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services non démarrés</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(250, 204, 21, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #facc15;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #fafafa;
    }
    p {
      color: #a1a1aa;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .host {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.85rem;
      color: #71717a;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .btn-primary {
      background: #fafafa;
      color: #09090b;
    }
    .btn-primary:hover {
      background: #e4e4e7;
    }
    .btn-outline {
      background: transparent;
      color: #a1a1aa;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.05);
      color: #e4e4e7;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #52525b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-13.5 0a3 3 0 0 1-3-3m3 3h13.5m-13.5 0a3 3 0 0 1 3-3m-3 3V6.75a3 3 0 0 1 3-3h10.5a3 3 0 0 1 3 3v4.5m-16.5 0h16.5m-16.5 0a3 3 0 0 0-3 3"/>
      </svg>
    </div>
    <h1>Services non démarrés</h1>
    <div class="host" id="hostname"></div>
    <p>
      Le proxy a bien trouvé la route, mais les conteneurs Docker de ce projet ne sont pas encore lancés.
      Rendez-vous dans le dashboard Site Factory pour démarrer les services.
    </p>
    <div class="actions">
      <a href="http://localhost:3100/dashboard/projects" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955a1.126 1.126 0 0 1 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        Dashboard
      </a>
      <a href="http://traefik.localhost" class="btn-outline">
        Traefik
      </a>
    </div>
    <p class="footer">Site Factory — Reverse proxy Traefik</p>
  </div>
  <script>
    document.getElementById('hostname').textContent = window.location.hostname;
  </script>
</body>
</html>
